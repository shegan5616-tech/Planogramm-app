<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Планограмма</title>

<style>

body{
font-family:Arial,sans-serif;
max-width:900px;
margin:auto;
padding:15px;
background:#f4f4f4;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input,button{
width:100%;
padding:12px;
margin-top:8px;
box-sizing:border-box;
}

button{
border:0;
border-radius:8px;
cursor:pointer;
}

.blue{
background:#2196f3;
color:white;
}

.green{
background:#4caf50;
color:white;
}

.red{
background:#f44336;
color:white;
}

.shelf{
border:2px dashed #777;
min-height:100px;
padding:10px;
display:flex;
flex-wrap:wrap;
}

.product{
background:#4caf50;
color:white;
padding:10px;
margin:5px;
border-radius:8px;
display:flex;
gap:10px;
align-items:center;
}

.remove{
background:white;
color:red;
width:auto;
padding:5px;
}

.shelfButton{
background:#ddd;
}

.active{
background:#2196f3;
color:white;
}

</style>

</head>

<body>

<h2>Планограмма магазина</h2>


<div class="card">

<h3>Полки</h3>

<input id="newShelfWidth"
placeholder="Ширина новой полки см">

<button class="blue"
onclick="addShelf()">
Добавить полку
</button>

<div id="shelfList"></div>

</div>



<div class="card">

<h3 id="currentShelfTitle">
Выберите полку
</h3>

<div id="info">
</div>

<div id="shelf"
class="shelf">
</div>

</div>



<div class="card">

<h3>Товар</h3>

<input id="name"
placeholder="Название">

<input id="barcode"
placeholder="Штрихкод">

<input id="width"
placeholder="Ширина см"
type="number">


<button class="green"
onclick="addProduct()">
Добавить на полку
</button>

</div>



<div class="card">

<h3>Каталог</h3>

<button class="blue"
onclick="saveProduct()">
Сохранить текущий товар
</button>

<div id="catalog"></div>

</div>



<script>


let shelves =
JSON.parse(
localStorage.getItem("shelves") || "[]"
);


let catalog =
JSON.parse(
localStorage.getItem("catalog") || "[]"
);


let currentShelf = 0;



function saveShelves(){

localStorage.setItem(
"shelves",
JSON.stringify(shelves)
);

}



function addShelf(){

let width =
Number(
document.getElementById(
"newShelfWidth"
).value
);


if(!width){
alert("Введите ширину");
return;
}


shelves.push({

width:width,

products:[]

});


saveShelves();

renderShelves();


selectShelf(
shelves.length-1
);

}




function renderShelves(){

let div =
document.getElementById(
"shelfList"
);

div.innerHTML="";


shelves.forEach(
(s,i)=>{


let btn =
document.createElement(
"button"
);


btn.className =
"shelfButton";


if(i==currentShelf)
btn.className="active";


btn.innerText =
"Полка "+(i+1)+
" ("+s.width+" см)";


btn.onclick=()=>{

selectShelf(i);

};


div.appendChild(btn);


}

);


}



function selectShelf(i){

currentShelf=i;

renderShelves();

renderShelf();


}



function renderShelf(){

let shelf =
shelves[currentShelf];


if(!shelf)
return;


document.getElementById(
"currentShelfTitle"
).innerText =
"Полка "+(currentShelf+1);



let div =
document.getElementById(
"shelf"
);


div.innerHTML="";


let used=0;


shelf.products.forEach(
(p,index)=>{


used+=p.width;


let item =
document.createElement(
"div"
);


item.className="product";


item.innerHTML =
p.name+
" ("+
p.width+
"см)";


let del =
document.createElement(
"button"
);


del.innerText="✕";

del.className="remove";


del.onclick=()=>{


shelf.products.splice(
index,
1
);


saveShelves();

renderShelf();


};



item.appendChild(del);


div.appendChild(item);


}

);


document.getElementById(
"info"
).innerText =

"Занято: "+
used+
" см | Свободно: "+
(shelf.width-used)+
" см";


}




function addProduct(){


let shelf =
shelves[currentShelf];


if(!shelf){

alert("Создайте полку");

return;

}



let name =
document.getElementById(
"name"
).value;


let width =
Number(
document.getElementById(
"width"
).value
);



if(!name || !width)
return;



let used =
shelf.products.reduce(
(a,b)=>a+b.width,
0
);



if(
used+width >
shelf.width
){

alert(
"Нет места"
);

return;

}



shelf.products.push({

name:name,

width:width

});


saveShelves();

renderShelf();


}




function saveProduct(){


let product={


name:
document.getElementById(
"name"
).value,


barcode:
document.getElementById(
"barcode"
).value,


width:
Number(
document.getElementById(
"width"
).value
)


};



catalog.push(product);


localStorage.setItem(
"catalog",
JSON.stringify(catalog)
);


renderCatalog();

}



function renderCatalog(){


let div =
document.getElementById(
"catalog"
);


div.innerHTML="";


catalog.forEach(p=>{


let b =
document.createElement(
"button"
);


b.innerText =
p.name+
" "+
p.width+
"см";


b.onclick=()=>{


document.getElementById(
"name"
).value=p.name;


document.getElementById(
"width"
).value=p.width;


addProduct();


};



div.appendChild(b);



});


}




renderShelves();

renderCatalog();

if(shelves.length)
selectShelf(0);


</script>


</body>
</html>
