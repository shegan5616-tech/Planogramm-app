<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Планограмма</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:15px;
background:#f4f4f4;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input,button{
width:100%;
padding:12px;
margin-top:8px;
box-sizing:border-box;
}

button{
border:0;
border-radius:8px;
}

.blue{
background:#2196f3;
color:white;
}

.green{
background:#4caf50;
color:white;
}

.red{
background:#f44336;
color:white;
}

.shelf{
border:2px dashed #777;
min-height:100px;
padding:10px;
display:flex;
flex-wrap:wrap;
}

.product{
background:#4caf50;
color:white;
padding:10px;
margin:5px;
border-radius:8px;
}


</style>

</head>


<body>


<h2>
Планограмма магазина
</h2>


<div class="card">


<h3>
Резервная копия
</h3>


<button class="blue"
onclick="exportData()">

Скачать планограмму

</button>


<input type="file"
id="importFile">


<button class="green"
onclick="importData()">

Загрузить планограмму

</button>


</div>




<div class="card">


<h3>
Полки
</h3>


<input id="newWidth"
placeholder="Ширина полки см">


<button class="blue"
onclick="addShelf()">

Добавить полку

</button>


<div id="shelves"></div>


</div>





<div class="card">


<h3 id="title">
Полка
</h3>


<div id="info">

</div>


<div id="shelf"
class="shelf">

</div>


</div>





<div class="card">


<h3>
Товар
</h3>


<input id="name"
placeholder="Название">


<input id="barcode"
placeholder="Штрихкод">


<input id="width"
type="number"
placeholder="Ширина см">



<button class="green"
onclick="addProduct()">

Добавить на полку

</button>


<button class="blue"
onclick="saveProduct()">

Сохранить товар

</button>



</div>





<div class="card">


<h3>
Каталог
</h3>


<div id="catalog">

</div>


</div>




<script>



let shelves =
JSON.parse(
localStorage.getItem("shelves") || "[]"
);



let catalog =
JSON.parse(
localStorage.getItem("catalog") || "[]"
);



let current = 0;



function save(){

localStorage.setItem(
"shelves",
JSON.stringify(shelves)
);


localStorage.setItem(
"catalog",
JSON.stringify(catalog)
);


}





function addShelf(){


let w =
Number(
document.getElementById(
"newWidth"
).value
);



if(!w)return;



shelves.push({

width:w,

products:[]

});


save();


renderShelves();


selectShelf(
shelves.length-1
);


}




function renderShelves(){


let div =
document.getElementById(
"shelves"
);


div.innerHTML="";



shelves.forEach(
(s,i)=>{


let b =
document.createElement(
"button"
);


b.innerText =
"Полка "+
(i+1)+
" "+
s.width+
"см";


b.onclick=()=>selectShelf(i);



div.appendChild(b);



}

);


}





function selectShelf(i){


current=i;


renderShelves();

renderShelf();


}





function renderShelf(){


let s =
shelves[current];


if(!s)return;


document.getElementById(
"title"
).innerText =
"Полка "+(current+1);



let div =
document.getElementById(
"shelf"
);


div.innerHTML="";


let used=0;



s.products.forEach(
(p)=>{


used+=p.width;


let x =
document.createElement(
"div"
);


x.className="product";


x.innerText =
p.name+
" "+
p.width+
"см";



div.appendChild(x);


}

);



document.getElementById(
"info"
).innerText =

"Занято "+
used+
" см. Свободно "+
(s.width-used)+
" см";


}






function addProduct(){


let s =
shelves[current];


if(!s)return;



let name =
document.getElementById(
"name"
).value;



let width =
Number(
document.getElementById(
"width"
).value
);



let used =
s.products.reduce(
(a,b)=>a+b.width,
0
);



if(
used+width>s.width
){

alert(
"Нет места"
);

return;

}



s.products.push({

name:name,

width:width

});


save();


renderShelf();


}




function saveProduct(){


catalog.push({

name:
document.getElementById(
"name"
).value,


barcode:
document.getElementById(
"barcode"
).value,


width:
Number(
document.getElementById(
"width"
).value
)


});


save();


renderCatalog();


}




function renderCatalog(){


let d =
document.getElementById(
"catalog"
);


d.innerHTML="";



catalog.forEach(
(p)=>{


let b =
document.createElement(
"button"
);


b.innerText =
p.name+
" "+
p.width+
"см";


b.onclick=()=>{


document.getElementById(
"name"
).value=p.name;


document.getElementById(
"width"
).value=p.width;



addProduct();


};



d.appendChild(b);


}

);


}




function exportData(){


let data={

shelves:shelves,

catalog:catalog

};



let blob =
new Blob(
[
JSON.stringify(data)
],
{
type:"application/json"
}
);



let a =
document.createElement(
"a"
);


a.href =
URL.createObjectURL(blob);


a.download =
"planogram.json";


a.click();


}





function importData(){


let file =
document.getElementById(
"importFile"
).files[0];



let reader =
new FileReader();



reader.onload=function(e){


let data =
JSON.parse(
e.target.result
);



shelves =
data.shelves;


catalog =
data.catalog;


save();


renderShelves();

renderCatalog();

selectShelf(0);


};



reader.readAsText(file);



}




renderShelves();

renderCatalog();

if(shelves.length)
selectShelf(0);



</script>


</body>
</html>
